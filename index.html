<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agencio</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- =========================
  Dev1 : Hero Section
  Owner: Dev1
  Rule: Dev1 แก้เฉพาะใน block นี้เท่านั้น เพื่อป้องกัน Git conflict
========================= -->
    <section
      id="dev1-hero"
      class="relative w-full overflow-hidden bg-[#F3F7FC] px-6 pt-7 pb-20 md:px-10 lg:px-0"
    >
      <!-- Header / Navbar -->
      <header
        class="relative z-50 mx-auto flex max-w-[1120px] items-center justify-between"
      >
        <!-- Logo -->
        <a href="#" class="flex items-center gap-4">
          <div class="relative h-[39px] w-[52px]">
            <img
              src="./public/image/Polygon 1.png"
              alt="Blue logo shape"
              class="absolute left-0 top-0 h-full w-full object-contain"
            />
            <img
              src="./public/image/Polygon 2.png"
              alt="White logo shape"
              class="absolute left-[6px] top-[2px] h-[33px] w-[33px] object-contain"
            />
          </div>

          <span class="text-[32px] font-bold leading-none text-[#0B0B45]">
            Agencio
          </span>
        </a>

        <!-- Desktop Menu -->
        <nav
          class="ml-70 hidden items-center gap-10 text-sm text-[#0B0B45] md:flex"
        >
          <a href="#" class="hover:text-[#2176FF]">Home</a>
          <a href="#" class="hover:text-[#2176FF]">Category</a>
          <a href="#" class="hover:text-[#2176FF]">Service</a>
          <a href="#" class="hover:text-[#2176FF]">Blog</a>
          <a href="#" class="hover:text-[#2176FF]">Contact</a>
        </nav>

        <!-- Button -->
        <a
          href="#"
          class="hidden rounded bg-[#FFD86E] px-8 py-4 text-sm text-[#0B0B45] transition hover:bg-[#ffc83d] md:block"
        >
          Create Account
        </a>

        <!-- Mobile Menu Icon -->
        <button
          type="button"
          class="flex h-10 w-10 items-center justify-center rounded-md bg-white shadow-sm md:hidden"
          aria-label="Open menu"
        >
          <span class="text-2xl text-[#0B0B45]">☰</span>
        </button>
      </header>

      <!-- Hero Content -->
      <div
        class="relative z-10 mx-auto mt-16 grid max-w-[1120px] items-center gap-12 md:mt-20 lg:grid-cols-[1fr_1.08fr]"
      >
        <!-- Left Content -->
        <div class="text-center lg:text-left">
          <div
            class="mb-5 flex items-center justify-center gap-4 lg:justify-start"
          >
            <p class="text-sm uppercase tracking-[3px] text-[#2176FF]">
              Creative Agency
            </p>
            <span class="mt-[10px] h-[2px] w-8 bg-[#2176FF]"></span>
          </div>

          <h1
            class="mx-auto max-w-[700px] text-[42px] font-bold leading-[1.25] tracking-[2px] text-[#0B0B45] sm:text-[52px] lg:mx-0"
          >
            We are here to give the best service
          </h1>

          <p
            class="mx-auto mt-7 max-w-[560px] text-base leading-8 text-[#7A7E9A] lg:mx-0"
          >
            It's crafted with the latest trend of design &amp; coded with all
            modern approaches. It's a robust &amp; multi-dimensional usable
            template.
          </p>

          <div
            class="mt-9 flex flex-col items-center justify-center gap-5 sm:flex-row lg:justify-start"
          >
            <a
              href="#"
              class="rounded bg-[#2176FF] px-10 py-4 text-sm font-semibold text-white transition hover:bg-[#005fe8]"
            >
              Get Started
            </a>

            <a
              href="#"
              class="flex items-center gap-3 text-sm font-medium text-[#0B0B45]"
            >
              <img
                src="./public/image/Group 53.png"
                alt="Play icon"
                class="h-6 w-6 object-contain"
              />
              Watch Video
            </a>
          </div>
        </div>

        <!-- Right Image Area -->
        <div class="relative mx-auto h-[632px] w-full max-w-[609px]">
          <!-- Blue Background -->
          <div
            class="absolute right-[40px] top-[0px] z-0 h-[577px] w-[369px] overflow-hidden rounded-tr-[45px] rounded-br-[10px] ]"
          >
            <!-- White slant bottom -->
            <div
              class="absolute bottom-0 left-0 h-[140px] w-full bg-white"
              style="clip-path: polygon(0 60%, 100% 25%, 100% 100%, 0 100%)"
            ></div>
          </div>

          <!-- Main Person Image -->
          <img
            src="./public/image/Mask Group.png"
            alt="Agency man"
            class="absolute bottom-[82px] right-[98px] z-20 w-[360px] object-contain"
          />

          <!-- Realtime Users Card -->
          <img
            src="./public/image/REAL TIME USER.png"
            alt="Realtime user graph"
            class="absolute right-[20px] top-[70px] z-30 w-[149px] object-contain"
          />

          <!-- Users Card -->
          <img
            src="./public/image/Group 7.png"
            alt="Users card"
            class="absolute bottom-[50px] left-[0px] z-30 w-[180px] object-contain"
          />

          <!-- Chat Icon -->
          <img
            src="./public/image/Group 32.png"
            alt="Chat icon"
            class="absolute bottom-[250px] left-[110px] z-40 h-[80px] w-[80px] object-contain"
          />
        </div>
      </div>

      <!-- Bottom White Skew Shape -->
      <div
        class="absolute bottom-[-1px] left-0 z-0 h-24 w-full bg-white"
        style="clip-path: polygon(0 30%, 100% 100%, 100% 100%, 0% 100%)"
      ></div>
    </section>
    <!-- =========================
  End Dev1 : Hero Section
========================= -->
    <!-- Dev2 -->
    <section></section>
    <!-- Dev3 -->
    <section></section>
    <!-- Dev4 -->
    <section></section>
    <!-- Dev5 -->
    <section></section>
  </body>
</html>
